name: DailyCall cron

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  process-calls:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Process scheduled calls
        run: curl -fsS --retry 3 --retry-delay 5 --retry-all-errors -X POST http://dailycall.care/api/calls/process-scheduled

      - name: Sync transcripts
        run: curl -fsS --retry 3 --retry-delay 5 --retry-all-errors -X POST http://dailycall.care/api/calls/sync-transcripts

      - name: Refresh cached current info
        run: curl -fsS --retry 3 --retry-delay 5 --retry-all-errors http://dailycall.care/api/voice/current-info/refresh || echo "Current info refresh failed; continuing."
